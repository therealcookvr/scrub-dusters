<form id="booking-form" class="card">
  <label>
    Name
    <input id="booking-name" required>
  </label>

  <label>
    Car Type
    <input id="booking-car" required>
  </label>

  <label>
    Wash Type
    <select id="booking-wash" required>
      <option value="">Select wash</option>
      <option>Basic Wash</option>
      <option>Wash & Wax</option>
      <option>Deep Clean</option>
    </select>
  </label>

  <label>
    Day
    <select id="booking-day" required>
      <option value="">Select day</option>
      <option>Monday</option>
      <option>Tuesday</option>
      <option>Wednesday</option>
      <option>Thursday</option>
      <option>Friday</option>
      <option>Saturday</option>
      <option>Sunday</option>
    </select>
  </label>

  <label>
    Time
    <select id="booking-time" required>
      <option value="">Select time</option>
    </select>
  </label>

  <label>
    Tip (optional)
    <input id="booking-tip" type="number" min="0" step="0.50" placeholder="0.00">
  </label>

  <label>
    Notes (optional)
    <textarea id="booking-notes"></textarea>
  </label>

  <button class="btn primary" type="submit">Submit Booking</button>

  <p id="booking-message" class="form-message"></p>

  <a id="pay-now-link" class="btn secondary" href="https://settleup.starlingbank.com/cycle-vote-twirl" target="_blank" style="display:none;">
    Pay Online Now
  </a>
</form>
