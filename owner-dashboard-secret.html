<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Owner Dashboard – Scrub Dusters</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">

<header class="site-header">
  <div class="logo">
    <div class="sponge-icon"></div>
    <span>Owner Dashboard</span>
  </div>
  <nav>
    <a href="index.html">Back to Site</a>
  </nav>
</header>

<section class="section">
  <h1>Dashboard</h1>
  <p class="small-muted">Live bookings pulled from Firebase. Click "Mark Paid" to record online payments.</p>

  <div class="dashboard-grid">
    <div class="card">
      <h3>Total Bookings</h3>
      <p class="big-number" id="total-bookings">0</p>
    </div>

    <div class="card">
      <h3>Bookings This Month</h3>
      <p class="big-number" id="monthly-bookings">0</p>
    </div>

    <div class="card">
      <h3>Bookings Today</h3>
      <p class="big-number" id="today-bookings">0</p>
    </div>

    <div class="card">
      <h3>Total Tips</h3>
      <p class="big-number" id="total-tips">£0</p>
    </div>

    <div class="card">
      <h3>Paid Bookings</h3>
      <p class="big-number" id="paid-count">0</p>
    </div>
  </div>

  <div class="card">
    <h3>Recent Bookings</h3>
    <table class="bookings-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Car</th>
          <th>Wash</th>
          <th>Day</th>
          <th>Time</th>
          <th>Paid</th>
          <th>Tip</th>
          <th>Actions</th>
          <th>Created</th>
        </tr>
      </thead>
      <tbody id="bookings-table-body">
        <tr><td colspan="9">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</section>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>

  const db = firebase.firestore();
</script>

<script src="dashboard.js"></script>
</body>
</html>
